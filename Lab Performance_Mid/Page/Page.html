<!DOCTYPE html>
<html>
<head>
    <title>Product Management Page</title>
    <link rel="stylesheet"  href="../Design/Style.css">
</head>
 
<body>
     
    <div class="box">
       
        <h2>Product Management Page</h2>
 
        <table>
            <tr>
                <td>Unit Price:</td>
            </tr>
 
            <tr>
                <td>
                <input type="text" value="1000" readonly>
                </td>
            </tr>
 
            <tr>
                <td>Quantity Per Day:</td>
            </tr>
 
            <tr>
                <td>
                    <input type="number" id="quantity" min="0" placeholder="Enter quantity">
                </td>
            </tr>
 
            <tr>
                <td>Total Price for 30 Days:</td>
            </tr>
 
            <tr>
                <td>
                    <input type="number" id="totalPrice" readonly>
                </td>
            </tr>
 
 
        </table>
    </div>
 
    <script src="../JS/Validation.script"></script>
</body>
</html>
